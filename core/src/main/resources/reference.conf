# Spring Boot Starter Actor - Reference Configuration
# This configuration is automatically loaded and merged with application configuration

pekko {
  serialization {
    jackson {
      # Configure Jackson modules for both JSON and CBOR serialization
      # The ParameterNamesModule allows Jackson to infer constructor parameter names
      # from bytecode (requires compilation with -parameters flag)
      jackson-json {
        jackson-modules += "com.fasterxml.jackson.module.paramnames.ParameterNamesModule"
      }
      jackson-cbor {
        jackson-modules += "com.fasterxml.jackson.module.paramnames.ParameterNamesModule"
      }
    }
  }
}
